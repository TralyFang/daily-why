name = "daily-why-cron-push"
main = "worker.js"
compatibility_date = "2026-06-25"

# Cron triggers — all times in UTC
# "30 2 * * *"  = 10:30 Beijing time (primary)
# "45 2 * * *"  = 10:45 Beijing time (retry if primary failed)
[triggers]
crons = ["30 2 * * *", "45 2 * * *"]

# Service binding to the main daily-why worker
[[services]]
binding = "MAIN_APP"
service = "daily-why"
